{% if not barkod %}
<p class="text-sm text-gray-400">Skeniraj barkod…</p>
{% else %}

{% include "skladiste/_artikl.html" %}

{% if artikl %}
<div class="bg-white rounded-lg border border-gray-300 shadow-md p-4 mt-3">
    <form method="post" action="/skladiste/zaprimanje/plan">
        <input type="hidden" name="barkod" value="{{ barkod }}">
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">2 · Broj paleta</label>
                <input id="broj-paleta" name="broj_paleta" type="number" value="1" min="1" max="200"
                       class="w-full border-2 border-blue-300 rounded-lg px-4 py-3 text-lg font-mono
                              focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">3 · Zona</label>
                <select name="zona"
                        class="w-full border-2 border-blue-300 rounded-lg px-3 py-3 text-lg bg-white
                               focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Auto (po prioritetima)</option>
                    {% for z in zone %}<option value="{{ z }}">Zona {{ z }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <button type="submit"
                class="w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold py-4 rounded-lg transition-colors">
            Generiraj plan pozicija →
        </button>
    </form>
</div>
<script>
    var bp = document.getElementById('broj-paleta');
    if (bp) { bp.focus(); bp.select(); }
</script>
{% endif %}
{% endif %}
