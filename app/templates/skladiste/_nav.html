{% set path = request.url.path %}
<div class="flex items-center gap-2 mb-4 text-sm flex-wrap">
    <a href="/skladiste" class="text-slate-500 hover:text-slate-800">← Skladište</a>
    <span class="text-gray-300">/</span>
    {% for href, ime in [
        ("/skladiste/zaprimanje", "Zaprimanje"),
        ("/skladiste/izdaj", "Izdavanje"),
        ("/skladiste/inventura", "Inventura"),
    ] %}
    <a href="{{ href }}"
       class="px-3 py-1.5 rounded font-semibold transition-colors
              {% if path.startswith(href) %}bg-blue-600 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-gray-200{% endif %}">
        {{ ime }}
    </a>
    {% endfor %}
</div>
