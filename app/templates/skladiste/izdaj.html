{% extends "base.html" %}
{% block title %}Izdavanje po količini — Skladište{% endblock %}

{% block content %}
{% include "skladiste/_nav.html" %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-3">
        <h1 class="text-xl font-bold text-gray-800">Izdavanje — po količini araka</h1>
        <a href="/skladiste/izdaj/jedna" class="text-sm text-blue-600 hover:underline">Jedna paleta (skener) →</a>
    </div>

    <div class="bg-white rounded-lg border border-gray-300 shadow-md p-4">
        <form hx-post="/skladiste/izdaj/predlozi" hx-target="#rezultat" hx-swap="innerHTML" hx-disabled-elt="find button">
            <label class="block text-sm font-semibold text-gray-600 mb-1">Šifra (sa zahtjevnice)</label>
            <input name="sifra" type="text" autocomplete="off" autofocus
                   placeholder="Upiši ili skeniraj šifru papira…"
                   class="w-full border-2 border-blue-300 rounded-lg px-4 py-3 text-lg font-mono
                          focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="grid grid-cols-2 gap-3 mt-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Količina (araka)</label>
                    <input name="araka" type="number" min="1" step="1" placeholder="npr. 12000"
                           class="w-full border-2 border-blue-300 rounded-lg px-4 py-3 text-lg font-mono
                                  focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Metoda</label>
                    <select name="metoda"
                            class="w-full border-2 border-blue-300 rounded-lg px-3 py-3 text-lg bg-white
                                   focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="fifo">FIFO (prvo ušlo)</option>
                        <option value="fefo">FEFO (prvi rok)</option>
                    </select>
                </div>
            </div>
            <button type="submit"
                    class="w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold py-4 rounded-lg transition-colors">
                Predloži palete →
            </button>
        </form>
    </div>

    <div id="rezultat" class="mt-4"></div>
</div>
{% endblock %}
