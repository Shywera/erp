{% extends "base.html" %}
{% block title %}{{ naziv }}{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
    <div class="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mb-5">
        <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-700 mb-2">{{ naziv }}</h1>
    <p class="text-slate-400 text-sm max-w-xs">Ovaj modul je trenutno u izradi i bit ce dostupan u kasnijoj fazi razvoja.</p>
</div>
{% endblock %}
