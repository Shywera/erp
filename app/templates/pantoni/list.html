{% extends "base.html" %}
{% block title %}Pantoni{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Pantoni</h1>

<div class="bg-white shadow rounded p-4 mb-4">
    <h2 class="font-semibold mb-3">Novi pantone</h2>
    <form method="post" action="/pantoni" class="flex flex-wrap items-end gap-3">
        <div>
            <label class="block text-sm text-gray-600">Kod *</label>
            <input name="kod" required placeholder="npr. 185 C" class="border rounded px-2 py-1">
        </div>
        <div>
            <label class="block text-sm text-gray-600">Naziv</label>
            <input name="naziv" class="border rounded px-2 py-1">
        </div>
        <div>
            <label class="block text-sm text-gray-600">Boja</label>
            <input name="hex_boja" type="color" value="#ffffff" class="border rounded h-9 w-16 p-1">
        </div>
        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Dodaj</button>
    </form>
</div>

<table class="w-full bg-white shadow rounded text-sm">
    <thead class="bg-gray-200 text-left">
        <tr>
            <th class="px-3 py-2">Kod</th>
            <th class="px-3 py-2">Naziv</th>
            <th class="px-3 py-2">Boja</th>
            <th class="px-3 py-2"></th>
        </tr>
    </thead>
    <tbody>
        {% for p in pantoni %}
        <tr class="border-b">
            <td class="px-3 py-2 font-mono">{{ p.kod }}</td>
            <td class="px-3 py-2">{{ p.naziv or "" }}</td>
            <td class="px-3 py-2">
                {% if p.hex_boja %}
                <span class="inline-block w-6 h-6 rounded border align-middle" style="background-color: {{ p.hex_boja }}"></span>
                <span class="text-gray-500 ml-1">{{ p.hex_boja }}</span>
                {% endif %}
            </td>
            <td class="px-3 py-2 text-right">
                <form method="post" action="/pantoni/{{ p.id }}/obrisi" onsubmit="return confirm('Obrisati pantone {{ p.kod }}?')">
                    <button type="submit" class="text-red-600 hover:underline">Obrisi</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
