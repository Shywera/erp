<tr id="materijal-{{ m.id }}" class="border-b border-gray-200 even:bg-gray-50 hover:bg-blue-50 transition-colors">
    <td class="px-3 py-2 font-mono text-xs">
        <a href="/materijali/{{ m.id }}" class="text-blue-700 font-semibold hover:underline">{{ m.sifra }}</a>
    </td>
    <td class="px-3 py-2">
        <a href="/materijali/{{ m.id }}" class="text-gray-900 font-medium hover:text-blue-700 hover:underline">{{ m.naziv }}</a>
    </td>
    <td class="px-3 py-2 text-gray-600">{{ m.jedinica }}</td>
    <td class="px-3 py-2 text-gray-700">{{ m.kategorija or "" }}</td>
    <td class="px-3 py-2 text-gray-700">{{ m.tip or "" }}</td>
    <td class="px-3 py-2 text-gray-700">{{ m.grupa or "" }}</td>
    <td class="px-3 py-2 text-gray-700">{{ m.podgrupa or "" }}</td>
    <td class="px-3 py-2 text-right text-gray-800 font-medium">{{ m.minimalna_kolicina if m.minimalna_kolicina is not none else "" }}</td>
    <td class="px-3 py-2 text-center">
        {% if m.aktivno %}
            <span class="inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold bg-green-100 text-green-800 border border-green-300">Da</span>
        {% else %}
            <span class="inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold bg-red-100 text-red-700 border border-red-300">Ne</span>
        {% endif %}
    </td>
    <td class="px-3 py-2 text-right">
        <button class="text-xs text-red-500 hover:text-red-700 font-medium hover:underline transition-colors"
                hx-delete="/materijali/{{ m.id }}"
                hx-target="#materijal-{{ m.id }}"
                hx-swap="outerHTML swap:0.2s"
                hx-confirm="Obrisati materijal {{ m.sifra }}?">Obrisi</button>
    </td>
</tr>
